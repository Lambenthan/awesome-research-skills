# Public-source skill whitelist.
#
# Every entry must point to a SKILL.md file in a PUBLIC GitHub repository.
# Build script fetches the SKILL.md frontmatter (name / description) from
# raw.githubusercontent.com and renders a card whose primary link goes to:
#   https://skills.sh/{repo}/{slug}        (skills.sh detail page)
# with a secondary link to the GitHub source.
#
# Schema per item:
#   slug:  required. Skill name (matches SKILL.md `name:` and the directory).
#   repo:  required. `owner/repo` on GitHub.
#   path:  optional. Path inside the repo to the skill directory. Defaults to
#          `skills/{slug}`. Override only if the repo lays things out differently.
#   ref:   optional. Branch / tag to fetch from. Defaults to `main`.
#
# Do NOT list skills you wrote locally and have not published anywhere.


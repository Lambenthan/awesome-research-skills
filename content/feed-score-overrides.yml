# Editor overrides for scored feed items.
#
# Format: flat map keyed by feed-scored.json item id (16-char sha1 of
# upstream URL). Each value can carry any subset of:
#   score          1-5 integer, overrides the LLM's score
#   category       overrides the LLM's classification
#   cleanedTitle   overrides the LLM's title rewrite
#   cn             overrides the LLM's short 中文导读
#
# Merge happens at the end of score-and-tag.mjs after all LLM calls.
# Items that the LLM scored below MIN_SCORE (3) but appear here with
# score>=3 get pulled back into the feed.
#
# Use sparingly — only for items where the LLM judgment is clearly wrong
# (e.g. it dropped a legitimate product launch as marketing) or where the
# cleaned title still leaks editor voice from the upstream source.

# Anthropic Claude Design — LLM scored 1/2 because the AIGCLINK source
# description reads as marketing copy. The product itself is a legitimate
# new design tool from Anthropic Labs, worth surfacing.
afabafae073055fd:
  score: 4
  category: 设计
  cleanedTitle: Anthropic Labs 发布 Claude Design 设计工具
  cn: |
    Anthropic Labs 推出 Claude Design，把对话式 AI 接入设计工作流：从理解品牌、生成产品原型、营销页面到团队协作与导出，覆盖完整链路。底层使用 Opus 4.7 推理，内置品牌自动构建系统读取代码库与设计文件后保持视觉一致性。支持文本、图片、文档、网页多模态输入，可对生成结果做行内评论、滑块调间距与颜色等精细化调整。


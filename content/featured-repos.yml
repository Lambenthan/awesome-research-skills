# Curated GitHub repos shown on the site. At build time the extract script
# calls https://api.github.com/repos/{owner}/{name} for each entry and writes
# stars/forks/description/language/topics to JSON.
#
# Unauthenticated calls have a 60/hr rate limit. The workflow / local build
# can set GITHUB_TOKEN (or GH_TOKEN) to lift this to 5000/hr; the script
# auto-detects it and falls back gracefully on a miss (keeps the entry with
# whatever cached data exists, or marks it as `fetchFailed`).

ai:
  - id: coding-agents
    label: 编码 Agent / Dev Tooling
    summary: 终端、IDE 和 CLI 形态的编码智能体；近一年密集发布、高速增长的方向。
    repos:
      - anthropics/claude-code
      - cline/cline
      - openai/codex
      - anomalyco/opencode
      - google-gemini/gemini-cli
      - voideditor/void
      - continuedev/continue
      - codestoryai/aide
      - AntonOsika/gpt-engineer
      - anthropics/claude-agent-sdk-typescript
      - anthropics/claude-agent-sdk-python

  - id: agent-frameworks
    label: Agent 框架
    summary: 多智能体、工作流编排、自主任务执行的通用框架。
    repos:
      - anthropics/anthropic-cookbook
      - microsoft/autogen
      - langchain-ai/langchain
      - langchain-ai/langgraph
      - crewAIInc/crewAI
      - All-Hands-AI/OpenHands
      - Significant-Gravitas/AutoGPT
      - mastra-ai/mastra
      - run-llama/llama_index

  - id: model-runtime
    label: 模型推理与部署
    summary: 本地跑大模型、推理引擎、量化与服务化。
    repos:
      - ollama/ollama
      - ggml-org/llama.cpp
      - vllm-project/vllm
      - huggingface/transformers
      - huggingface/text-generation-inference
      - lmstudio-ai/lmstudio.js
      - mlc-ai/mlc-llm

  - id: rag-retrieval
    label: RAG 与检索
    summary: 文档问答、向量库、检索增强生成、web 抓取。
    repos:
      - chroma-core/chroma
      - qdrant/qdrant
      - milvus-io/milvus
      - weaviate/weaviate
      - infiniflow/ragflow
      - mendableai/firecrawl
      - microsoft/markitdown

  - id: dev-toolkits
    label: SDK 与开发工具
    summary: 跨模型路由、构建 AI 应用的高层 SDK、observability。
    repos:
      - vercel/ai
      - BerriAI/litellm
      - assistant-ui/assistant-ui
      - Helicone/helicone
      - openlit/openlit

  - id: chat-ui
    label: 对话 UI
    summary: 本地或自托管的 LLM 聊天界面。
    repos:
      - danny-avila/LibreChat
      - lobehub/lobe-chat
      - open-webui/open-webui
      - mckaywrigley/chatbot-ui


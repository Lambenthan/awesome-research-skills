name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Two cron schedules:
  #   - every 6h: refresh repo stars, lab feeds, HN/GitHub latest
  #   - weekly on Sunday 02:00 UTC: also run extract-aigclink which scrapes
  #     d.aigclink.ai (heavy playwright work). Weekly is enough since
  #     AIGCLINK adds ~6 items / week to its public 50-slot table.
  schedule:
    - cron: "0 */6 * * *"
    - cron: "0 2 * * 0"

permissions:
  contents: write
  pages: write
  id-token: write
  models: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: /field-notes
      # 5000 req/hr instead of unauth 60/hr — needed for the full repo list.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Cron uses a multi-pass pipeline:
      #   1. extract  — produce skills/repos/articles JSON so fill-cn has
      #      input to score against
      #   2. extract-feed — pull 8 lab feeds (RSS + HTML + headless chromium)
      #      into feed-raw.json
      #   3. score-feed — call OpenRouter deepseek-v4-flash to score/tag/
      #      cn-write each item incrementally; new ids only
      #   4. fill-cn — generate cn for newly-discovered curated items
      #   5. build — prebuild re-runs extract, merging feed-scored.json
      #      into latest.json's rss[] field
      # On push triggers we skip the cron-only steps (push changes site
      # code, not data sources), so build runs straight through.
      - name: Initial extract for fill-cn input
        if: github.event_name == 'schedule'
        run: npm run extract

      - name: Install Playwright chromium
        if: github.event_name == 'schedule'
        run: npx playwright install --with-deps chromium

      - name: Extract lab feeds
        if: github.event_name == 'schedule'
        run: npm run extract-feed

      # AIGCLINK is a discovery layer for Chinese vendors + indie OSS
      # the lab feeds don't cover. It changes slowly, so we only re-scrape
      # on the weekly Sunday cron — not the every-6h main loop.
      - name: Extract AIGCLINK editor picks (weekly)
        if: github.event.schedule == '0 2 * * 0'
        run: npm run extract-aigclink

      - name: Score and tag feed items
        if: github.event_name == 'schedule'
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: npm run score-feed

      - name: Fill missing cn (cron only)
        if: github.event_name == 'schedule'
        env:
          GH_MODEL: deepseek/DeepSeek-V3-0324
        run: npm run fill-cn -- --missing

      - name: Build static export
        run: npm run build

      # Persist refreshed data snapshots back to main so future runs can
      # diff against them (star deltas, latest feed history). Only on
      # cron runs — push-triggered builds shouldn't touch the data files.
      # [skip ci] in the subject prevents this push from triggering
      # another workflow run; the current run still deploys what was
      # already built above.
      - name: Commit refreshed data snapshots
        if: github.event_name == 'schedule'
        run: |
          git add \
            scripts/star-history.json \
            src/data/generated/latest.json \
            src/data/generated/repos.json \
            src/data/generated/feed-raw.json \
            src/data/generated/feed-aigclink-raw.json \
            src/data/generated/feed-scored.json \
            content/cn-summaries.yml
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: refresh data snapshots [skip ci]"
            # Pull-rebase in case main moved between checkout and now
            # (a push happened during this CI run). Without this, the push
            # below would non-fast-forward fail silently.
            git pull --rebase --autostash origin main
            git push origin HEAD:main
          fi

      - name: Disable Jekyll on Pages
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

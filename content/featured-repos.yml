    label: 数据科学基础
    summary: 各方向都会用到的通用计算与表格库。
    repos:
      - pandas-dev/pandas
      - numpy/numpy
      - scipy/scipy
      - scikit-learn/scikit-learn
      - pola-rs/polars
      - dask/dask
      - apache/arrow

  - id: stats-causal

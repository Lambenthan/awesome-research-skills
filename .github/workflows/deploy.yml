name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Refresh repo stars + the /latest feed every 6 hours.
  # Public repo → unlimited Actions minutes, so frequency only costs
  # commit-log noise. 4 runs/day is well under the Pages soft limit of
  # 10 deploys/hour.
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write
  pages: write
  id-token: write
  models: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: /field-notes
      # 5000 req/hr instead of unauth 60/hr — needed for the full repo list.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Two-pass build for cron: extract once → fill any missing cn via
      # GH Models → let prebuild's extract pick up the new cn → build.
      # On push triggers we skip fill-cn (push doesn't add items, just
      # changes site code), so build runs straight through.
      - name: Initial extract for fill-cn input
        if: github.event_name == 'schedule'
        run: npm run extract

      - name: Fill missing cn (cron only)
        if: github.event_name == 'schedule'
        env:
          GH_MODEL: deepseek/DeepSeek-V3-0324
        run: npm run fill-cn -- --missing

      - name: Build static export
        run: npm run build

      # Persist refreshed data snapshots back to main so future runs can
      # diff against them (star deltas, latest feed history). Only on
      # cron runs — push-triggered builds shouldn't touch the data files.
      # [skip ci] in the subject prevents this push from triggering
      # another workflow run; the current run still deploys what was
      # already built above.
      - name: Commit refreshed data snapshots
        if: github.event_name == 'schedule'
        run: |
          git add \
            scripts/star-history.json \
            src/data/generated/latest.json \
            src/data/generated/repos.json \
            content/cn-summaries.yml
          if git diff --cached --quiet; then
            echo "No data changes to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit -m "chore: refresh data snapshots [skip ci]"
            # Pull-rebase in case main moved between checkout and now
            # (a push happened during this CI run). Without this, the push
            # below would non-fast-forward fail silently.
            git pull --rebase --autostash origin main
            git push origin HEAD:main
          fi

      - name: Disable Jekyll on Pages
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4

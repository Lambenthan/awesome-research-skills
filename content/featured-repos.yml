    summary: 贝叶斯、因果效应估计、生存分析、可解释性。
    repos:
      - pymc-devs/pymc
      - py-why/dowhy
      - microsoft/EconML
      - sebp/scikit-survival
      - shap/shap
      - interpretml/interpret
      - bambinos/bambi

  - id: viz
    label: 可视化
    summary: 静态与交互式科研绘图。
    repos:
      - matplotlib/matplotlib
      - mwaskom/seaborn
      - plotly/plotly.py
      - vega/vega-lite
      - altair-viz/altair
      - bokeh/bokeh

  - id: bio
    label: 生信与单细胞
    summary: 序列分析、单细胞、组学工作流。
    repos:
      - biopython/biopython
      - scverse/scanpy
      - scverse/anndata
      - scverse/scvi-tools
      - deeptools/deepTools
      - nf-core/tools

  - id: writing-pubs
    label: 写作与发表
    summary: 学术排版、引用样式、可重复性报告。
    repos:
      - quarto-dev/quarto-cli
      - jgm/pandoc
      - citation-style-language/styles
      - rstudio/bookdown
      - rstudio/rmarkdown
      - manubot/manubot

  - id: notebooks-apps
    label: 笔记本与轻量应用
    summary: Jupyter 生态、参数化笔记本、把分析变成 web app。
    repos:
      - jupyter/notebook
      - jupyterlab/jupyterlab
      - nteract/papermill
      - streamlit/streamlit
      - gradio-app/gradio

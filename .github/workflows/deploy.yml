name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Refresh repo star/fork counts daily so they don't drift too far.
  schedule:
    - cron: "0 4 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_BASE_PATH: /awesome-research-skills
      # 5000 req/hr instead of unauth 60/hr — needed for the full repo list.
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build static export
        run: npm run build

      # Persist the appended star snapshot back to main so future runs can
      # compute 7-day deltas. Only on cron-triggered runs (push-triggered
      # builds don't change star counts), and only if the file actually
      # changed. The "[skip ci]" tag prevents this push from triggering
      # another workflow run.
      - name: Commit refreshed star history
        if: github.event_name == 'schedule'
        run: |
          if [ -n "$(git status --porcelain scripts/star-history.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add scripts/star-history.json
            git commit -m "chore: refresh star history snapshot [skip ci]"
            git push
          fi

      - name: Disable Jekyll on Pages
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
